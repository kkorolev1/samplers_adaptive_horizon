name: gaussian_mixture9
num_components: 9
dim: 2
has_entropy: True

fn:
  _target_: targets.gmm9.GMM9
  num_components: ${target.num_components}
  dim: ${target.dim}
  log_Z: 0.
  can_sample: True
  sample_bounds: None
  loc_scaling: 40
  scale_scaling: 1

# Experiment-specific algorithm parameters
# !!! Default Parameters; Currently not tuned for this experiment !!!
# ----------------------------------------

gfn_non_acyclic:
  init_std: 1.0
  weight_decay: 0.0
  step_size: 1e-3
  bwd_step_size: 1e-3
  logZ_step_size: 1e-1
  init_logZ: 0.
  gamma: 0.1
  reg_coef: 0.0
  num_steps: 100
  eval_max_steps: 500
  loss_type: tb
  logr_clip: -1e5
  huber_delta: null
  grad_clip: 1.0

diff_sampler_clf:
  weight_decay: 0.0
  step_size: 1e-3
  bwd_step_size: 1e-3
  logZ_step_size: 1e-1
  init_logZ: 0.
  reg_coef: 0.0
  num_steps: 100
  logr_clip: -1e5
  huber_delta: null
  grad_clip: 1.0
  base_var: 5.0

all: # Parameters that are shared between all algorithms
  batch_size: 2000
  iters: 30000
  milestones: [10000, 20000]
  num_steps: 64
  use_lp: False
  num_hid: 256